name: integration-urirun-llm

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: integration-urirun-llm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fs-through-urirun-and-llm-runtime:
    name: FS connector -> urirun -> urirun-llm-runtime
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout urirun-connector-fs
        uses: actions/checkout@v4
        with:
          path: urirun-connector-fs

      - name: Checkout urirun
        uses: actions/checkout@v4
        with:
          repository: if-uri/urirun
          path: _deps/urirun

      - name: Checkout urirun-llm-runtime
        uses: actions/checkout@v4
        with:
          repository: if-uri/urirun-llm-runtime
          path: _deps/urirun-llm-runtime

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install urirun, current connector and llm runtime from source
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./_deps/urirun/adapters/python"
          python -m pip install -e "./urirun-connector-fs[test]"
          python -m pip install -e "./_deps/urirun-llm-runtime[dev]"

      - name: Create duplicate smoke files
        run: |
          mkdir -p "$RUNNER_TEMP/fs-smoke"
          printf 'same contents\n' > "$RUNNER_TEMP/fs-smoke/a.txt"
          printf 'same contents\n' > "$RUNNER_TEMP/fs-smoke/b.txt"

      - name: Verify connector package imports
        working-directory: urirun-connector-fs
        run: |
          python - <<'PY'
          from urirun_connector_fs.core import find, urirun_bindings

          bindings = urirun_bindings()
          assert "fs://host/duplicates/query/find" in bindings["bindings"]
          report = find(root=r"${{ runner.temp }}/fs-smoke", mode="sha256", min_size=1)
          assert report.get("ok") is True, report
          assert report.get("connector") == "fs", report
          assert report.get("duplicateGroups", 0) >= 1, report
          print("FS connector import and duplicate bindings OK")
          PY

      - name: Build isolated FS registry
        run: |
          mkdir -p .urirun

          python - <<'PY'
          import json
          from pathlib import Path
          from urirun_connector_fs.core import urirun_bindings

          bindings = urirun_bindings()
          out = Path(".urirun/fs.bindings.v2.json")
          out.write_text(json.dumps(bindings, indent=2, sort_keys=True), encoding="utf-8")

          text = json.dumps(bindings)
          assert "fs://host/duplicates/query/find" in text, "FS duplicate route missing"
          print("Wrote isolated FS bindings:", out)
          PY

          urirun compile .urirun/fs.bindings.v2.json --out .urirun/fs.registry.json

          test -s .urirun/fs.registry.json

      - name: Assert registry contains FS connector only
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          registry = json.loads(Path(".urirun/fs.registry.json").read_text(encoding="utf-8"))
          text = json.dumps(registry)

          assert "fs://host/duplicates/query/find" in text, "FS duplicate route missing from registry"

          forbidden = [
              "kvm://",
              "browser://",
              "http-check://",
              "router://",
              "mqtt://",
              "github://",
          ]

          for marker in forbidden:
              assert marker not in text, f"Unexpected non-FS connector route found: {marker}"

          print("Registry isolation OK: only FS routes are present.")
          PY

      - name: Run FS route directly through urirun
        run: |
          urirun run \
            'fs://host/duplicates/query/find' \
            .urirun/fs.registry.json \
            --execute \
            --allow 'fs://**' \
            --payload "{\"root\":\"$RUNNER_TEMP/fs-smoke\",\"mode\":\"sha256\",\"min_size\":1}" \
            | tee run-response.json

          python - <<'PY'
          import json
          from pathlib import Path

          response = json.loads(Path("run-response.json").read_text(encoding="utf-8"))
          result = response.get("result")
          value = result.get("value", result) if isinstance(result, dict) else result
          assert response.get("ok") is True, response
          assert isinstance(value, dict), response
          assert value.get("ok") is True, response
          assert value.get("connector") == "fs", response
          assert value.get("duplicateGroups", 0) >= 1, response
          print("FS duplicate route through urirun run OK")
          PY

      - name: Start urirun node
        run: |
          nohup urirun node serve \
            --execute \
            --host 127.0.0.1 \
            --port 18765 \
            --registry .urirun/fs.registry.json \
            --allow 'fs://**' \
            > urirun-node.log 2>&1 &

          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18765/health; then
              echo "urirun node is healthy"
              break
            fi
            sleep 2
          done

          curl -sf http://127.0.0.1:18765/health
          curl -sf http://127.0.0.1:18765/routes | tee routes.json
          grep -q 'fs://host/duplicates/query/find' routes.json

      - name: POST /run smoke test
        run: |
          curl -sf -X POST http://127.0.0.1:18765/run \
            -H 'Content-Type: application/json' \
            -d "{\"uri\":\"fs://host/duplicates/query/find\",\"mode\":\"execute\",\"payload\":{\"root\":\"$RUNNER_TEMP/fs-smoke\",\"mode\":\"sha256\",\"min_size\":1}}" \
            | tee node-run-response.json

          python - <<'PY'
          import json
          from pathlib import Path

          response = json.loads(Path("node-run-response.json").read_text(encoding="utf-8"))
          result = response.get("result")
          value = result.get("value", result) if isinstance(result, dict) else result
          assert response.get("ok") is True, response
          assert isinstance(value, dict), response
          assert value.get("ok") is True, response
          assert value.get("connector") == "fs", response
          assert value.get("duplicateGroups", 0) >= 1, response
          print("/run FS duplicate route OK")
          PY

      - name: LLM runtime Executor smoke test
        working-directory: urirun-connector-fs
        env:
          URIRUN_NODE_URL: http://127.0.0.1:18765
          FS_SMOKE_ROOT: ${{ runner.temp }}/fs-smoke
        run: |
          python scripts/ci_urirun_llm_smoke.py

      - name: Dump urirun node log on failure
        if: failure()
        run: |
          echo "===== urirun-node.log ====="
          cat urirun-node.log || true
